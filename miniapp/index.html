<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#006CFF">
  <title>Mercadinho M&J</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./version-bootstrap.js?v=2026.07.12.231"></script>
  <link id="mainStylesheet" rel="stylesheet" href="./styles.css?v=2026.07.12.231">
</head>
<body>
  <div id="miniapp-root" class="app-loading">
    <div class="miniapp-loading-brand">
      <img id="miniappLoadingLogo" src="./assets/logo-mj-mercadinho.png" alt="Mercadinho M&J">
    </div>
  </div>
  <script>
    (function initMiniAppLogoCacheBust() {
      const styleHref = document.getElementById('mainStylesheet')?.getAttribute?.('href') || '';
      const buildFromStyle = String((styleHref.match(/(?:\\?|&)v=([^&]+)/) || [])[1] || '').trim();
      const query = new URLSearchParams(location.search);
      const build = String(
        buildFromStyle ||
        query.get('v') ||
        query.get('miniapp_v') ||
        Date.now()
      ).trim();
      const loadingLogo = document.getElementById('miniappLoadingLogo');
      if (loadingLogo) {
        const src = String(loadingLogo.getAttribute('src') || '').split('?')[0];
        loadingLogo.src = `${src}?v=${encodeURIComponent(build)}`;
      }
      globalThis.__MJ_LOGO_BUILD = build;
    })();
  </script>
  <script id="miniappBridge" src="./miniappTelegramBridge.client.js?v=2026.07.12.231"></script>
  <script id="miniappTunnel" src="./miniappTelegramTunnel.client.js?v=2026.07.12.231"></script>
  <script id="miniappMainJs" type="module" src="./src/main.js?v=2026.07.12.231"></script>
</body>
</html>
